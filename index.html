<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>APEX | Live Command Center</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: -apple-system, sans-serif; background: #0a0a0a; color: #fff; min-height: 100vh; }
        .header { background: linear-gradient(135deg, #1a1a2e, #16213e); padding: 25px 20px; }
        .header h1 { font-size: 32px; background: linear-gradient(135deg, #00d4ff, #7b2cbf); -webkit-background-clip: text; -webkit-text-fill-color: transparent; }
        .live-indicator { display: inline-flex; align-items: center; gap: 8px; color: #00ff88; font-size: 14px; }
        .dot { width: 8px; height: 8px; border-radius: 50%; background: #00ff88; animation: pulse 2s infinite; }
        @keyframes pulse { 0%, 100% { opacity: 1; } 50% { opacity: 0.4; } }
        .card { background: #151515; border-radius: 20px; padding: 25px; margin: 15px; border: 1px solid #222; }
        .card-title { font-size: 12px; color: #888; text-transform: uppercase; margin-bottom: 15px; display: flex; justify-content: space-between; }
        .refresh-btn { background: #00d4ff; color: #000; border: none; padding: 5px 15px; border-radius: 15px; cursor: pointer; font-size: 12px; }
        .crypto-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(200px, 1fr)); gap: 15px; }
        .crypto-card { background: #0f0f0f; border-radius: 16px; padding: 20px; text-align: center; }
        .crypto-price { font-size: 28px; font-weight: 800; margin: 10px 0; }
        .crypto-change { font-size: 14px; }
        .positive { color: #00ff88; }
        .negative { color: #ff4444; }
        .reddit-list { list-style: none; }
        .reddit-item { background: #0f0f0f; border-radius: 12px; padding: 15px; margin-bottom: 10px; }
        .reddit-title { font-weight: 600; margin-bottom: 5px; }
        .reddit-meta { font-size: 12px; color: #666; }
        .loading { text-align: center; color: #666; padding: 20px; }
    </style>
</head>
<body>
    <div class="header">
        <h1>◉ APEX</h1>
        <div class="live-indicator">
            <span class="dot"></span>
            LIVE DATA FEEDS
        </div>
    </div>

    <!-- CRYPTO SECTION -->
    <div class="card">
        <div class="card-title">
            <span>💰 Crypto Tracker (Live)</span>
            <button class="refresh-btn" onclick="fetchCrypto()">Refresh</button>
        </div>
        <div class="crypto-grid" id="crypto-data">
            <div class="loading">Loading crypto data...</div>
        </div>
    </div>

    <!-- REDDIT SECTION -->
    <div class="card">
        <div class="card-title">
            <span>🔥 Reddit Trends (r/startups)</span>
            <button class="refresh-btn" onclick="fetchReddit()">Refresh</button>
        </div>
        <ul class="reddit-list" id="reddit-data">
            <div class="loading">Loading Reddit...</div>
        </ul>
    </div>

    <!-- FOREX SECTION -->
    <div class="card">
        <div class="card-title">
            <span>💱 Exchange Rates (USD Base)</span>
            <button class="refresh-btn" onclick="fetchForex()">Refresh</button>
        </div>
        <div id="forex-data">
            <div class="loading">Loading exchange rates...</div>
        </div>
    </div>

    <script>
        // ========== CRYPTO API (CoinGecko - Free) ==========
        async function fetchCrypto() {
            const container = document.getElementById('crypto-data');
            container.innerHTML = '<div class="loading">Loading...</div>';
            
            try {
                const response = await fetch('https://api.coingecko.com/api/v3/simple/price?ids=bitcoin,ethereum,solana&vs_currencies=usd&include_24hr_change=true');
                const data = await response.json();
                
                container.innerHTML = `
                    <div class="crypto-card">
                        <div style="font-size: 24px;">₿</div>
                        <div class="crypto-price">$${data.bitcoin.usd.toLocaleString()}</div>
                        <div class="crypto-change ${data.bitcoin.usd_24h_change > 0 ? 'positive' : 'negative'}">
                            ${data.bitcoin.usd_24h_change > 0 ? '↑' : '↓'} ${Math.abs(data.bitcoin.usd_24h_change).toFixed(2)}%
                        </div>
                    </div>
                    <div class="crypto-card">
                        <div style="font-size: 24px;">Ξ</div>
                        <div class="crypto-price">$${data.ethereum.usd.toLocaleString()}</div>
                        <div class="crypto-change ${data.ethereum.usd_24h_change > 0 ? 'positive' : 'negative'}">
                            ${data.ethereum.usd_24h_change > 0 ? '↑' : '↓'} ${Math.abs(data.ethereum.usd_24h_change).toFixed(2)}%
                        </div>
                    </div>
                    <div class="crypto-card">
                        <div style="font-size: 24px;">◎</div>
                        <div class="crypto-price">$${data.solana.usd.toLocaleString()}</div>
                        <div class="crypto-change ${data.solana.usd_24h_change > 0 ? 'positive' : 'negative'}">
                            ${data.solana.usd_24h_change > 0 ? '↑' : '↓'} ${Math.abs(data.solana.usd_24h_change).toFixed(2)}%
                        </div>
                    </div>
                `;
            } catch (e) {
                container.innerHTML = '<div class="loading">Error loading data. Try again.</div>';
            }
        }

        // ========== REDDIT API (No Auth Required) ==========
        async function fetchReddit() {
            const container = document.getElementById('reddit-data');
            container.innerHTML = '<div class="loading">Loading...</div>';
            
            try {
                const response = await fetch('https://www.reddit.com/r/startups/hot.json?limit=5');
                const data = await response.json();
                
                container.innerHTML = data.data.children.map(post => `
                    <li class="reddit-item">
                        <div class="reddit-title">${post.data.title}</div>
                        <div class="reddit-meta">
                            ⬆ ${post.data.score} | 💬 ${post.data.num_comments} | r/${post.data.subreddit}
                        </div>
                    </li>
                `).join('');
            } catch (e) {
                container.innerHTML = '<div class="loading">Error loading Reddit. CORS may block.</div>';
            }
        }

        // ========== FOREX API (Free) ==========
        async function fetchForex() {
            const container = document.getElementById('forex-data');
            container.innerHTML = '<div class="loading">Loading...</div>';
            
            try {
                const response = await fetch('https://api.exchangerate-api.com/v4/latest/USD');
                const data = await response.json();
                
                const rates = ['EUR', 'GBP', 'JPY', 'CAD', 'AUD'];
                container.innerHTML = rates.map(currency => `
                    <div style="display: inline-block; background: #0f0f0f; padding: 15px 25px; margin: 5px; border-radius: 12px;">
                        <div style="font-size: 12px; color: #888;">USD/${currency}</div>
                        <div style="font-size: 24px; font-weight: 800;">${data.rates[currency].toFixed(2)}</div>
                    </div>
                `).join('');
            } catch (e) {
                container.innerHTML = '<div class="loading">Error loading forex data.</div>';
            }
        }

        // Load all on page load
        window.onload = () => {
            fetchCrypto();
            fetchReddit();
            fetchForex();
        };
    </script>
</body>
</html>
